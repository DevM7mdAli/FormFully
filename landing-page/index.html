              "@type": "Question",
              "name": "Why not Cmd + Shift + F on macOS?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Chrome reserves Cmd + Shift + F for DevTools search, so that combination will not fire. Formfully uses Alt + Shift + F on every platform. You can rebind it anytime at chrome://extensions/shortcuts."
              }
            },
            {
              "@type": "Question",
              "name": "Can I change the keyboard shortcut?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. Open chrome://extensions/shortcuts in your browser, find the Formfully Fill inputs command, click the pencil icon, and set any key combination that is not already reserved by the browser."
